<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Availability – ClassConnect</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff8e1;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    h1 {
      color: #e67e22;
      margin-bottom: 30px;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 20px 30px;
      font-size: 18px;
      font-weight: bold;
      background-color: #f1c40f;
      border: none;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      width: 250px;
      transition: background 0.3s;
    }

    .btn:hover {
      background-color: #e67e22;
    }

    .label {
      margin-top: 10px;
      font-size: 16px;
      font-weight: normal;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>Manage Your Availability</h1>

  <div class="btn-group">
    <div>
      <button class="btn">Available</button>
      <p class="label">Accept All Meetings</p>
    </div>
    <div>
      <button class="btn">Unavailable</button>
      <p class="label">Reject All Meetings</p>
    </div>
  </div>

</body>
</html>
