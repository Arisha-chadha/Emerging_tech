<script>
  const API_BASE_URL = "http://127.0.0.1:5001";

  async function loginUser(event) {
    event.preventDefault();

    const selectedRole = document.getElementById("role").value;
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    const errorBox = document.getElementById("error-message");
    const successBox = document.getElementById("success-message");

    errorBox.textContent = "";
    successBox.textContent = "";

    try {
      const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email: email,
          password: password
        })
      });

      const result = await response.json();

      if (!response.ok) {
        errorBox.textContent = result.message || "Login failed.";
        return false;
      }

      const user = result.data.user;
      const token = result.data.token;

      if (selectedRole !== user.role) {
        errorBox.textContent = `This account is registered as ${user.role}, but you selected ${selectedRole}.`;
        return false;
      }

      // remove old generic keys if they exist
      localStorage.removeItem("token");
      localStorage.removeItem("user");

      // store separate keys for each role
      if (user.role === "student") {
        localStorage.setItem("studentToken", token);
        localStorage.setItem("studentUser", JSON.stringify(user));
      } else if (user.role === "professor") {
        localStorage.setItem("professorToken", token);
        localStorage.setItem("professorUser", JSON.stringify(user));
      }

      successBox.textContent = "Login successful!";

      if (user.role === "student") {
        document.getElementById("login-page").style.display = "none";
        document.getElementById("main-content").style.display = "flex";
      } else if (user.role === "professor") {
        window.location.href = "professor_home.html";
      }

    } catch (error) {
      console.error("Login error:", error);
      errorBox.textContent = "Unable to connect to server.";
    }

    return false;
  }

  function logoutUser() {
    localStorage.removeItem("studentToken");
    localStorage.removeItem("studentUser");
    localStorage.removeItem("professorToken");
    localStorage.removeItem("professorUser");
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "index.html";
  }
</script>
