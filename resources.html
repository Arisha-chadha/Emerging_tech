<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Academic Resources – ClassConnect</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff8e1;
      margin: 0;
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #e67e22;
      margin-bottom: 30px;
    }

    .subject-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .subject-card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      width: 260px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .subject-card h3 {
      color: #f39c12;
      margin-bottom: 15px;
    }

    .btn {
      padding: 8px 15px;
      background-color: #f1c40f;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background-color: #e67e22;
    }
  </style>
</head>
<body>

  <h1>Academic Resources</h1>

  <div class="subject-list">
    <div class="subject-card">
      <h3>Design & Analysis of Algorithms (DAA)</h3>
      <button class="btn">View Resources</button>
    </div>
    <div class="subject-card">
      <h3>Operating Systems (OS)</h3>
      <button class="btn">View Resources</button>
    </div>
    <div class="subject-card">
      <h3>Advanced Computer Design (ACD)</h3>
      <button class="btn">View Resources</button>
    </div>
    <div class="subject-card">
      <h3>Economics</h3>
      <button class="btn">View Resources</button>
    </div>
    <div class="subject-card">
      <h3>Open Elective (OE)</h3>
      <button class="btn">View Resources</button>
    </div>
  </div>

</body>
</html>
