<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Resources – ClassConnect</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff8e1;
      padding: 30px;
      margin: 0;
    }

    h1 {
      color: #e67e22;
      text-align: center;
      margin-bottom: 30px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 20px;
      margin: 20px 0;
    }

    .card p {
      margin: 6px 0;
      font-size: 16px;
    }

    .btn {
      padding: 10px 16px;
      background-color: #f1c40f;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    .btn:hover {
      background-color: #e67e22;
    }
  </style>
</head>
<body>

  <h1>Upload Resources</h1>

  <div class="container">

    <div class="card">
      <p><strong>Class:</strong> CSE - 2A</p>
      <p><strong>Semester:</strong> 4th</p>
      <p><strong>Subject:</strong> Data Structures</p>
      <button class="btn">Upload Resource</button>
    </div>

    <div class="card">
      <p><strong>Class:</strong> CSE - 2B</p>
      <p><strong>Semester:</strong> 4th</p>
      <p><strong>Subject:</strong> Operating Systems</p>
      <button class="btn">Upload Resource</button>
    </div>

    <div class="card">
      <p><strong>Class:</strong> CSE - 3C</p>
      <p><strong>Semester:</strong> 6th</p>
      <p><strong>Subject:</strong> Artificial Intelligence</p>
      <button class="btn">Upload Resource</button>
    </div>

    <div class="card">
      <p><strong>Class:</strong> IT - 1A</p>
      <p><strong>Semester:</strong> 2nd</p>
      <p><strong>Subject:</strong> Computer Fundamentals</p>
      <button class="btn">Upload Resource</button>
    </div>

  </div>

</body>
</html>
