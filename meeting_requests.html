<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Meetings – ClassConnect</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff8e1;
      padding: 30px;
      margin: 0;
    }
    h1 {
      color: #e67e22;
      text-align: center;
      margin-bottom: 20px;
    }
    .btn-toggle {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 20px;
      background-color: #f1c40f;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      margin: 5px;
    }
    .btn:hover {
      background-color: #e67e22;
    }
    .reject-btn {
      background-color: #e74c3c;
    }
    .reject-btn:hover {
      background-color: #c0392b;
    }
    .card {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 20px;
      margin: 15px auto;
      max-width: 700px;
    }
    .section {
      display: none;
    }
    .section.active {
      display: block;
    }
    .empty-msg {
      text-align: center;
      color: #666;
      margin-top: 30px;
    }
    .status {
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Meeting Management</h1>

  <div class="btn-toggle">
    <button class="btn" onclick="showSection('requests')">Incoming Requests</button>
    <button class="btn" onclick="showSection('scheduled')">My Meetings</button>
  </div>

  <div class="section active" id="requests">
    <div id="incoming-requests-container"></div>
  </div>

  <div class="section" id="scheduled">
    <div id="scheduled-meetings-container"></div>
  </div>

  <script>
    const API_BASE_URL = "http://127.0.0.1:5001";

    function showSection(sectionId) {
      document.getElementById("requests").classList.remove("active");
      document.getElementById("scheduled").classList.remove("active");
      document.getElementById(sectionId).classList.add("active");
    }

    function getProfessorToken() {
      return localStorage.getItem("professorToken");
    }

    function getProfessorUser() {
      const raw = localStorage.getItem("professorUser");
      return raw ? JSON.parse(raw) : null;
    }

    function ensureProfessorLoggedIn() {
      const token = getProfessorToken();
      const user = getProfessorUser();

      if (!token || !user || (user.role || "").toLowerCase() !== "professor") {
        alert("Please login as professor first.");
        window.location.href = "index.html";
        return false;
      }

      return true;
    }

    async function loadIncomingRequests() {
      const container = document.getElementById("incoming-requests-container");

      if (!ensureProfessorLoggedIn()) {
        container.innerHTML = '<p class="empty-msg">Please login as professor first.</p>';
        return;
      }

      const token = getProfessorToken();

      try {
        const response = await fetch(`${API_BASE_URL}/api/meetings/incoming`, {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const result = await response.json();
        container.innerHTML = "";

        if (!response.ok) {
          container.innerHTML = `<p class="empty-msg">${result.message || "Failed to load requests."}</p>`;
          return;
        }

        const meetings = (result.data || []).filter(meeting => meeting.status === "pending");

        if (meetings.length === 0) {
          container.innerHTML = '<p class="empty-msg">No incoming requests.</p>';
          return;
        }

        meetings.forEach(meeting => {
          const studentName = meeting.student_name || meeting.student?.name || "Student";
          const agenda = meeting.agenda || "No agenda provided";
          const date = meeting.date || "N/A";
          const start = meeting.start_time || "N/A";
          const end = meeting.end_time || "N/A";
          const location = meeting.location || "TBD";

          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <p><strong>Student:</strong> ${studentName}</p>
            <p><strong>Agenda:</strong> ${agenda}</p>
            <p><strong>Date:</strong> ${date}</p>
            <p><strong>Time:</strong> ${start} - ${end}</p>
            <p><strong>Location:</strong> ${location}</p>
            <p class="status"><strong>Status:</strong> pending</p>
            <p><strong>Update Note:</strong> ${meeting.update_note || "No updates yet"}</p>
            <p><strong>Last Updated By:</strong> ${meeting.last_updated_by || "N/A"}</p>
            <button class="btn" onclick="updateMeetingStatus(${meeting.id}, 'accept')">Accept</button>
            <button class="btn reject-btn" onclick="updateMeetingStatus(${meeting.id}, 'reject')">Reject</button>
          `;
          container.appendChild(card);
        });

      } catch (error) {
        console.error(error);
        container.innerHTML = '<p class="empty-msg">Error loading requests.</p>';
      }
    }

    async function loadMyMeetings() {
      const container = document.getElementById("scheduled-meetings-container");

      if (!ensureProfessorLoggedIn()) {
        container.innerHTML = '<p class="empty-msg">Please login as professor first.</p>';
        return;
      }

      const token = getProfessorToken();

      try {
        const response = await fetch(`${API_BASE_URL}/api/meetings/mine`, {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const result = await response.json();
        container.innerHTML = "";

        if (!response.ok) {
          container.innerHTML = `<p class="empty-msg">${result.message || "Failed to load meetings."}</p>`;
          return;
        }

        const meetings = result.data || [];

        if (meetings.length === 0) {
          container.innerHTML = '<p class="empty-msg">No meetings found.</p>';
          return;
        }

        meetings.forEach(meeting => {
          const studentName = meeting.student_name || meeting.student?.name || "Student";
          const agenda = meeting.agenda || "No agenda provided";
          const date = meeting.date || "N/A";
          const start = meeting.start_time || "N/A";
          const end = meeting.end_time || "N/A";
          const location = meeting.location || "TBD";
          const status = meeting.status || "pending";

          let actionButtons = "";

          if (status === "pending") {
            actionButtons = `
              <button class="btn" onclick="updateMeetingStatus(${meeting.id}, 'accept')">Accept</button>
              <button class="btn reject-btn" onclick="updateMeetingStatus(${meeting.id}, 'reject')">Reject</button>
            `;
          } else if (status === "confirmed") {
            actionButtons = `
              <button class="btn" onclick="changeLocation(${meeting.id})">Change Location</button>
              <button class="btn" onclick="rescheduleMeeting(${meeting.id})">Reschedule</button>
              <button class="btn reject-btn" onclick="rejectConfirmedMeeting(${meeting.id})">Reject Meeting</button>
            `;
          }

          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <p><strong>Student:</strong> ${studentName}</p>
            <p><strong>Agenda:</strong> ${agenda}</p>
            <p><strong>Date:</strong> ${date}</p>
            <p><strong>Time:</strong> ${start} - ${end}</p>
            <p><strong>Location:</strong> ${location}</p>
            <p class="status"><strong>Status:</strong> ${status}</p>
            <p><strong>Update Note:</strong> ${meeting.update_note || "No updates yet"}</p>
            <p><strong>Last Updated By:</strong> ${meeting.last_updated_by || "N/A"}</p>
            ${actionButtons}
          `;
          container.appendChild(card);
        });

      } catch (error) {
        console.error(error);
        container.innerHTML = '<p class="empty-msg">Error loading meetings.</p>';
      }
    }

    async function updateMeetingStatus(meetingId, action) {
      if (!ensureProfessorLoggedIn()) return;

      const token = getProfessorToken();

      try {
        const response = await fetch(`${API_BASE_URL}/api/meetings/${meetingId}/${action}`, {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const result = await response.json();

        if (!response.ok) {
          alert(result.message || `Failed to ${action} meeting.`);
          return;
        }

        alert(`Meeting ${action}ed successfully.`);
        await loadIncomingRequests();
        await loadMyMeetings();
        showSection('scheduled');

      } catch (error) {
        console.error(error);
        alert(`Error trying to ${action} meeting.`);
      }
    }

    async function changeLocation(meetingId) {
      if (!ensureProfessorLoggedIn()) return;

      const token = getProfessorToken();
      const newLocation = prompt("Enter new location:");

      if (!newLocation || !newLocation.trim()) return;

      try {
        const response = await fetch(`${API_BASE_URL}/api/meetings/${meetingId}/reschedule`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            location: newLocation.trim()
          })
        });

        const result = await response.json();

        if (!response.ok) {
          alert(result.message || "Failed to update location.");
          return;
        }

        alert("Location updated successfully.");
        await loadIncomingRequests();
        await loadMyMeetings();
        showSection('scheduled');

      } catch (error) {
        console.error(error);
        alert("Error updating location.");
      }
    }

    async function rescheduleMeeting(meetingId) {
      if (!ensureProfessorLoggedIn()) return;

      const token = getProfessorToken();

      const newDate = prompt("Enter new date (YYYY-MM-DD):");
      if (!newDate) return;

      const newStart = prompt("Enter new start time (HH:MM):");
      if (!newStart) return;

      const newEnd = prompt("Enter new end time (HH:MM):");
      if (!newEnd) return;

      const newLocation = prompt("Enter new location:");
      if (!newLocation) return;

      try {
        const response = await fetch(`${API_BASE_URL}/api/meetings/${meetingId}/reschedule`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            date: newDate,
            start_time: newStart,
            end_time: newEnd,
            location: newLocation.trim()
          })
        });

        const result = await response.json();

        if (!response.ok) {
          alert(result.message || "Failed to reschedule meeting.");
          return;
        }

        alert("Meeting updated successfully.");
        await loadIncomingRequests();
        await loadMyMeetings();
        showSection('scheduled');

      } catch (error) {
        console.error(error);
        alert("Error updating meeting.");
      }
    }

    async function rejectConfirmedMeeting(meetingId) {
      if (!ensureProfessorLoggedIn()) return;

      const token = getProfessorToken();

      try {
        const response = await fetch(`${API_BASE_URL}/api/meetings/${meetingId}/reject`, {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const result = await response.json();

        if (!response.ok) {
          alert(result.message || "Failed to reject meeting.");
          return;
        }

        alert("Meeting rejected successfully.");
        await loadIncomingRequests();
        await loadMyMeetings();
        showSection('scheduled');

      } catch (error) {
        console.error(error);
        alert("Error rejecting meeting.");
      }
    }

    window.onload = function() {
      showSection('requests');
      loadIncomingRequests();
      loadMyMeetings();
    };
  </script>

</body>
</html>
