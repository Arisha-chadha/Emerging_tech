<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages – ClassConnect</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff8e1;
      margin: 0;
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #e67e22;
    }

    .professor-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .professor-card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      width: 260px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .professor-card h3 {
      margin-bottom: 10px;
      color: #f39c12;
    }

    .btn {
      padding: 8px 15px;
      background-color: #f1c40f;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background-color: #e67e22;
    }

    /* Popup Styles */
    #popup {
      display: none;
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translate(-50%, -20%);
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      z-index: 10;
      width: 300px;
    }

    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 5;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-top: 10px;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .message {
      margin-top: 10px;
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Ask a Query</h1>

  <div class="professor-list">
    <div class="professor-card">
      <h3>Prof. A. Sharma</h3>
      <button class="btn" onclick="openPopup('Prof. A. Sharma')">Ask Query</button>
    </div>
    <div class="professor-card">
      <h3>Prof. B. Mehta</h3>
      <button class="btn" onclick="openPopup('Prof. B. Mehta')">Ask Query</button>
    </div>
    <div class="professor-card">
      <h3>Prof. C. Rajput</h3>
      <button class="btn" onclick="openPopup('Prof. C. Rajput')">Ask Query</button>
    </div>
    <div class="professor-card">
      <h3>Prof. D. Khan</h3>
      <button class="btn" onclick="openPopup('Prof. D. Khan')">Ask Query</button>
    </div>
    <div class="professor-card">
      <h3>Prof. E. Joshi</h3>
      <button class="btn" onclick="openPopup('Prof. E. Joshi')">Ask Query</button>
    </div>
  </div>

  <div id="overlay"></div>
  <div id="popup">
    <h4 id="popup-title">Ask Your Question</h4>
    <textarea placeholder="Type your query here..."></textarea>
    <p class="message" id="popup-msg"></p>
    <br/>
    <button class="btn" onclick="submitQuery()">Send</button>
    <button class="btn" onclick="closePopup()">Close</button>
    
  </div>

  <script>
    
        let selectedProfessor = '';
      
        function openPopup(profName) {
          selectedProfessor = profName;
          document.getElementById("popup-title").textContent = `Ask Query to ${profName}`;
          document.getElementById("popup").style.display = "block";
          document.getElementById("overlay").style.display = "block";
          document.getElementById("popup-msg").textContent = '';
          document.querySelector("textarea").value = '';
        }
      
        function closePopup() {
          document.getElementById("popup").style.display = "none";
          document.getElementById("overlay").style.display = "none";
        }
      
        function submitQuery() {
          const queryText = document.querySelector("textarea").value;
          if (queryText.trim() === "") {
            document.getElementById("popup-msg").textContent = "Please enter a query.";
            document.getElementById("popup-msg").style.color = "red";
            return;
          }
      
          // Create chatbox element
          const chatContainer = document.createElement("div");
          chatContainer.style.background = "#fff";
          chatContainer.style.border = "1px solid #ccc";
          chatContainer.style.borderRadius = "8px";
          chatContainer.style.padding = "15px";
          chatContainer.style.margin = "30px auto";
          chatContainer.style.width = "320px";
          chatContainer.style.boxShadow = "0 4px 10px rgba(0,0,0,0.1)";
      
          const profHeading = document.createElement("h4");
          profHeading.style.color = "#f39c12";
          profHeading.innerText = `${selectedProfessor}`;
      
          const studentMsg = document.createElement("p");
          studentMsg.innerHTML = `<strong>You:</strong> ${queryText}`;
      
          const waitingMsg = document.createElement("p");
          waitingMsg.style.color = "gray";
          waitingMsg.innerHTML = `<strong>${selectedProfessor}:</strong> Waiting for reply...`;
      
          chatContainer.appendChild(profHeading);
          chatContainer.appendChild(studentMsg);
          chatContainer.appendChild(waitingMsg);
      
          document.body.appendChild(chatContainer);
      
          // Close popup
          closePopup();
        }
      </script>
      
 

</body>
</html>
