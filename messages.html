<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Messages – ClassConnect</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #ededed;
  margin: 0;
  padding: 20px;
}

.chat-layout {
  display: flex;
  gap: 20px;
  max-width: 1100px;
  margin: auto;
}

#user-list {
  width: 260px;
  background: #f7f0da;
  border-radius: 16px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.user-btn {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #f1c40f;
  color: white;
  font-weight: bold;
  cursor: pointer;
  text-align: left;
}

.chat-panel {
  flex: 1;
  background: #f7f0da;
  border-radius: 16px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  min-height: 500px;
}

#chat-box {
  flex: 1;
  background: white;
  border-radius: 12px;
  padding: 16px;
  overflow-y: auto;
  margin-bottom: 14px;
}

.msg {
  margin-bottom: 10px;
  max-width: 70%;
}

.msg p {
  margin: 0;
  padding: 10px 12px;
  border-radius: 12px;
}

.msg.me {
  margin-left: auto;
  text-align: right;
}

.msg.me p {
  background: #f39c12;
  color: white;
}

.msg.other p {
  background: #ececec;
  color: #2c3e50;
}

.chat-input-row {
  display: flex;
  gap: 10px;
}

#msg-input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.chat-input-row button {
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: #f1c40f;
  color: white;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<h2 style="text-align:center; color:#e67e22;">Messages</h2>

<div class="chat-layout">
  <div id="user-list"></div>

  <div class="chat-panel">
    <h3 id="chat-title">Select a professor</h3>
    <div id="chat-box"></div>

    <div class="chat-input-row">
      <input type="text" id="msg-input" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const API_BASE_URL = "http://127.0.0.1:5001";
let selectedUserId = null;
let refreshInterval = null;

function getStudentToken() {
  return localStorage.getItem("studentToken");
}

function getStudentUser() {
  const raw = localStorage.getItem("studentUser");
  return raw ? JSON.parse(raw) : null;
}

function ensureStudentLoggedIn() {
  const token = getStudentToken();
  const user = getStudentUser();

  if (!token || !user || (user.role || "").toLowerCase() !== "student") {
    alert("Please login as student first.");
    window.location.href = "index.html";
    return false;
  }

  return true;
}

async function loadProfessors() {
  try {
    const res = await fetch(`${API_BASE_URL}/api/users/professors`);
    const result = await res.json();

    const list = document.getElementById("user-list");
    list.innerHTML = "";

    (result.data || []).forEach(prof => {
      const btn = document.createElement("button");
      btn.textContent = prof.name;
      btn.className = "user-btn";

      btn.onclick = () => {
        selectedUserId = prof.id;
        document.getElementById("chat-title").textContent = "Chat with " + prof.name;
        loadMessages();
      };

      list.appendChild(btn);
    });
  } catch (error) {
    console.error("Error loading professors:", error);
    document.getElementById("user-list").innerHTML = "<p>Failed to load professors.</p>";
  }
}

async function loadMessages() {
  if (!ensureStudentLoggedIn()) return;
  if (!selectedUserId) return;

  const token = getStudentToken();
  const user = getStudentUser();

  try {
    const res = await fetch(
      `${API_BASE_URL}/api/messages/thread?with_user_id=${selectedUserId}`,
      {
        headers: {
          "Authorization": `Bearer ${token}`
        }
      }
    );

    const result = await res.json();
    const chatBox = document.getElementById("chat-box");
    chatBox.innerHTML = "";

    if (!res.ok) {
      chatBox.innerHTML = `<p>${result.message || "Failed to load messages."}</p>`;
      return;
    }

    (result.data || []).forEach(msg => {
      const div = document.createElement("div");
      div.className = msg.sender?.id === user.id ? "msg me" : "msg other";
      div.innerHTML = `<p>${msg.body}</p>`;
      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  } catch (error) {
    console.error("Error loading messages:", error);
  }
}

async function sendMessage() {
  if (!ensureStudentLoggedIn()) return;

  const token = getStudentToken();
  const text = document.getElementById("msg-input").value.trim();

  if (!selectedUserId || !text) return;

  try {
    const res = await fetch(`${API_BASE_URL}/api/messages`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({
        recipient_id: selectedUserId,
        body: text
      })
    });

    const result = await res.json();

    if (!res.ok) {
      alert(result.message || "Failed to send message");
      return;
    }

    document.getElementById("msg-input").value = "";
    await loadMessages();
  } catch (error) {
    console.error("Send message error:", error);
    alert("Error sending message.");
  }
}

window.onload = function () {
  if (!ensureStudentLoggedIn()) return;

  loadProfessors();

  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(() => {
    if (selectedUserId) loadMessages();
  }, 2000);
};
</script>

</body>
</html>
